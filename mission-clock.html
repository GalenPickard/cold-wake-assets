<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mission Clock — ISV Argos</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fff5cc;
    color: #1a1a1a;
    font-family: 'IBM Plex Mono', 'Roboto Mono', 'SF Mono', Menlo, monospace;
    overflow: hidden;
  }
  .stack {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
    box-sizing: border-box;
  }
  .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
  }
  .date {
    font-size: clamp(20px, 5.5vw, 32px);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-top: 6px;
  }
  .time {
    font-size: clamp(14px, 3.8vw, 22px);
    font-weight: 500;
    margin-top: 2px;
    opacity: 0.92;
  }
  .drift {
    font-size: 10px;
    font-style: italic;
    opacity: 0.5;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="stack">
  <div class="title">MISSION CLOCK</div>
  <div class="date" id="date">2038-01-19</div>
  <div class="time" id="time">03:14:07 UTC</div>
  <div class="drift" id="drift">drift +0d 00h · last clean shift 03:14:06</div>
</div>
<script>
  // The Y2K38 wraparound moment, in epoch seconds.
  // 2147483647 == 2038-01-19 03:14:07 UTC
  var ORIGIN_EPOCH_SEC = 2147483647;
  var PAGE_LOAD_MS = Date.now();

  function pad2(n) { return String(n).padStart(2, '0'); }

  function tick() {
    var elapsedSec = Math.floor((Date.now() - PAGE_LOAD_MS) / 1000);
    var mockSec = ORIGIN_EPOCH_SEC + elapsedSec;
    var d = new Date(mockSec * 1000);
    var yyyy = d.getUTCFullYear();
    var mm = pad2(d.getUTCMonth() + 1);
    var dd = pad2(d.getUTCDate());
    var hh = pad2(d.getUTCHours());
    var mi = pad2(d.getUTCMinutes());
    var ss = pad2(d.getUTCSeconds());
    document.getElementById('date').textContent = yyyy + '-' + mm + '-' + dd;
    document.getElementById('time').textContent = hh + ':' + mi + ':' + ss + ' UTC';
    // Drift line stays static — it's the in-fiction last-known-good
    // anchor before the wraparound.
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
